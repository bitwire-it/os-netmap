# /usr/local/opnsense/service/conf/actions.d/actions_netmap.conf
#
# configd action for async nmap scanning.
#
# Key learnings from debugging:
#   - No space after colon (key:value not key: value)
#   - Section name is [scan_async] NOT [netmap scan_async]
#     The topic prefix comes from the filename (actions_netmap → netmap)
#     So full action name is "netmap scan_async"
#   - Two separate %s tokens for ip + job_id
#   - Scripts live at /usr/local/opnsense/scripts/netmap/ (NOT service/scripts/)

[scan_async]
command:/usr/local/opnsense/scripts/netmap/scan_start.py
parameters:%s %s
type:script_output
message:netmap scan async
description:Start async network map nmap scan
